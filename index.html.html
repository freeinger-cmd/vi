<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>自動詞・他動詞 練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1826;
    --surface2: #232136;
    --border: rgba(255,255,255,0.08);
    --accent: #e8c547;
    --accent2: #7ec8c8;
    --red: #e06c75;
    --green: #98c379;
    --text: #f0ede6;
    --text2: #a09bb5;
    --text3: #5c5778;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 56px 24px 20px;
    background: linear-gradient(180deg, #1a1826 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .app-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .12em;
  }

  .stats-row {
    display: flex;
    gap: 8px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    font-size: 12px;
    font-weight: 500;
  }

  .stat-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
  }
  .stat-pill.correct .dot { background: var(--green); }
  .stat-pill.wrong .dot { background: var(--red); }

  /* Progress bar */
  .progress-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ── Mode bar ── */
  .mode-bar {
    display: flex;
    gap: 8px;
    padding: 14px 24px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .mode-bar::-webkit-scrollbar { display: none; }

  .mode-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e17;
    font-weight: 700;
  }

  /* ── Wrong list ── */
  .wrong-list {
    margin: 12px 24px 0;
    padding: 12px 14px;
    background: rgba(224,108,117,.1);
    border: 1px solid rgba(224,108,117,.2);
    border-radius: var(--radius-sm);
    display: none;
  }
  .wrong-list h3 {
    font-size: 11px;
    color: var(--red);
    letter-spacing: .06em;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .wrong-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .wrong-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(224,108,117,.15);
    color: #f0a0a6;
    font-family: 'Noto Serif JP', serif;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    padding: 20px 24px 0;
  }

  /* Question counter */
  .q-counter {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: .08em;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px 24px;
    margin-bottom: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0;
    transition: opacity .3s;
  }
  .card.answered::before { opacity: 1; }

  .q-sentence {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
  }
  .q-sentence .blank {
    display: inline-block;
    border-bottom: 2px solid var(--accent);
    min-width: 2em;
    color: var(--accent);
    opacity: .5;
  }

  .q-reading {
    font-size: 12px;
    color: var(--text2);
    font-family: 'Noto Serif JP', serif;
  }

  .q-zh {
    font-size: 12px;
    color: var(--text3);
    display: none;
  }
  .q-zh.show { display: block; }

  .feedback {
    font-size: 13px;
    font-weight: 500;
    min-height: 1.2em;
    margin-top: 4px;
  }
  .feedback.ok { color: var(--green); }
  .feedback.ng { color: var(--red); }

  /* Option buttons */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .opt-btn {
    padding: 16px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .opt-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity .1s;
  }
  .opt-btn:active::after { opacity: .05; }

  .opt-btn small {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text2);
  }

  .opt-btn:disabled { cursor: default; }
  .opt-btn:disabled::after { display: none; }

  .opt-btn.ok {
    background: rgba(152,195,121,.12);
    border-color: var(--green);
    color: var(--green);
  }
  .opt-btn.ok small { color: rgba(152,195,121,.7); }

  .opt-btn.ng {
    background: rgba(224,108,117,.1);
    border-color: var(--red);
    color: var(--red);
  }
  .opt-btn.ng small { color: rgba(224,108,117,.7); }

  /* Next button */
  .next-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: none;
    transition: all .15s;
    margin-bottom: 24px;
  }
  .next-btn.show {
    display: block;
    animation: fadeUp .2s ease;
  }
  .next-btn:active { background: var(--surface2); }

  /* Result screen */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 20px;
    flex: 1;
  }
  .result-screen.show { display: flex; }

  .result-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .result-label {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: .06em;
  }

  .result-score {
    font-family: 'Noto Serif JP', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
  }

  .result-pct {
    font-size: 14px;
    color: var(--accent2);
    margin-top: -12px;
  }

  .result-msg {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 300px;
  }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }

  .result-btn {
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .result-btn:active { background: var(--surface2); }
  .result-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e17;
    font-weight: 700;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-4px); }
    40%,80% { transform: translateX(4px); }
  }
  .shake { animation: shake .3s ease; }

  /* Install hint */
  .install-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 8px 24px 20px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="app-title">自動詞・他動詞</div>
    <div class="stats-row">
      <div class="stat-pill correct"><div class="dot"></div><span id="sc">0</span></div>
      <div class="stat-pill wrong"><div class="dot"></div><span id="sw">0</span></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress" style="width:1%"></div>
  </div>
</div>

<!-- Mode bar -->
<div class="mode-bar">
  <button class="mode-btn active" id="m-all" onclick="setMode('all')">全部 (90)</button>
  <button class="mode-btn" id="m-wrong" onclick="setMode('wrong')">錯題複習</button>
  <button class="mode-btn" onclick="reshuffle()">洗牌</button>
</div>

<!-- Wrong list -->
<div class="wrong-list" id="wrong-list">
  <h3>累積錯題</h3>
  <div class="wrong-tags" id="wrong-tags"></div>
</div>

<!-- Main -->
<div class="main" id="main-area">
  <div class="q-counter" id="q-counter">1 / 90</div>

  <div class="card" id="q-card">
    <div class="q-sentence" id="q-sen"></div>
    <div class="q-reading" id="q-read"></div>
    <div class="q-zh" id="q-zh"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="options" id="options">
    <button class="opt-btn" id="opt0" onclick="ans(0)"></button>
    <button class="opt-btn" id="opt1" onclick="ans(1)"></button>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQ()">次へ →</button>
</div>

<!-- Result screen -->
<div class="result-screen" id="result-screen">
  <div class="result-kanji" id="r-kanji">優</div>
  <div class="result-label">練習完了</div>
  <div class="result-score" id="r-score">81 / 90</div>
  <div class="result-pct" id="r-pct">90.0%</div>
  <div class="result-msg" id="r-msg"></div>
  <div class="result-btns">
    <button class="result-btn primary" onclick="restartAll()">もう一度（全部）</button>
    <button class="result-btn" onclick="restartWrong()">錯題だけ練習</button>
  </div>
</div>

<div class="install-hint">📱 ブラウザで「ホーム画面に追加」してアプリとして使えます</div>

  {ji:"回(まわ)り",jiR:"まわり",jiZh:"轉動了(自然)",ta:"回(まわ)し",taR:"まわし",taZh:"讓它轉動",noun:"風車(ふうしゃ)",nounR:"ふうしゃ"},
  {ji:"離(はな)れ",jiR:"はなれ",jiZh:"鬆開了(自然)",ta:"離(はな)し",taR:"はなし",taZh:"把它放開",noun:"手綱(たずな)",nounR:"たずな"},
  {ji:"集(あつ)まり",jiR:"あつまり",jiZh:"集合了(自然)",ta:"集(あつ)め",taR:"あつめ",taZh:"把他們召集",noun:"友達(ともだち)",nounR:"ともだち"},
  {ji:"なり",jiR:"なり",jiZh:"變成了(自然)",ta:"し",taR:"し",taZh:"做(主動)",noun:"それ",nounR:"それ"},
];

function buildQ(d){
  return [
    {sen:d.noun+'が（　　）ます',senR:d.nounR+'が（　　）ます',zh:d.jiZh,ji:d.ji,jiR:d.jiR,ta:d.ta,taR:d.taR,correct:'ji',correctV:d.ji,correctZh:d.jiZh,label:d.ji+'/'+d.ta},
    {sen:(d.taSubj||d.noun)+'を（　　）ます',senR:(d.taSubjR||d.nounR)+'を（　　）ます',zh:d.taZh,ji:d.ji,jiR:d.jiR,ta:d.ta,taR:d.taR,correct:'ta',correctV:d.ta,correctZh:d.taZh,label:d.ji+'/'+d.ta},
  ];
}

const ALL = RAW.flatMap(buildQ);
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}

// Storage
let wrongLabels = new Set();
const STORAGE_KEY = 'jlpt-n4-wrong-v1';

function loadWrong(){
  try{ const d=localStorage.getItem(STORAGE_KEY); if(d) wrongLabels=new Set(JSON.parse(d)); }catch(e){}
  updateWrongUI();
}
function saveWrong(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify([...wrongLabels])); }catch(e){}
}
function clearWrong(){
  wrongLabels.clear(); saveWrong(); updateWrongUI();
  document.getElementById('m-wrong').textContent='錯題複習';
}
function updateWrongUI(){
  const el=document.getElementById('wrong-tags');
  const wl=document.getElementById('wrong-list');
  const wb=document.getElementById('m-wrong');
  if(!wrongLabels.size){ wl.style.display='none'; wb.textContent='錯題複習'; return; }
  wl.style.display='block';
  el.innerHTML=[...wrongLabels].map(l=>`<span class="wrong-tag">${l}ます</span>`).join('');
  wb.textContent=`錯題複習 (${wrongLabels.size})`;
}

let deck=[], idx=0, stats={c:0,w:0}, answered=false, mode='all';

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('m-'+m).classList.add('active');
  if(m==='wrong'){
    const wq=ALL.filter(q=>wrongLabels.has(q.label));
    deck=wq.length?shuffle(wq):shuffle(ALL);
  } else { deck=shuffle(ALL); }
  idx=0; stats={c:0,w:0};
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('main-area').style.display='';
  render();
}

function reshuffle(){
  deck=shuffle(deck); idx=0; stats={c:0,w:0};
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('main-area').style.display='';
  render();
}

function render(){
  if(idx>=deck.length){ showResult(); return; }
  const q=deck[idx];
  answered=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('q-zh').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('q-card').classList.remove('answered');
  document.getElementById('q-sen').innerHTML=q.sen.replace('（　　）','<span class="blank">　　</span>');
  document.getElementById('q-read').textContent=q.senR.replace('（　　）','（　　）');
  document.getElementById('q-zh').textContent=q.zh;
  const pct=(idx+1)/deck.length*100;
  document.getElementById('progress').style.width=Math.max(pct,1)+'%';
  document.getElementById('q-counter').textContent=(idx+1)+' / '+deck.length;
  const opts=Math.random()<.5?[{k:'ji',v:q.ji,r:q.jiR},{k:'ta',v:q.ta,r:q.taR}]:[{k:'ta',v:q.ta,r:q.taR},{k:'ji',v:q.ji,r:q.jiR}];
  opts.forEach((o,i)=>{
    const b=document.getElementById('opt'+i);
    b.disabled=false; b.className='opt-btn';
    b.innerHTML=o.v+'ます<small>（'+o.r+'ます）</small>';
    b.dataset.key=o.k;
  });
  document.getElementById('sc').textContent=stats.c;
  document.getElementById('sw').textContent=stats.w;
}

function ans(i){
  if(answered)return;
  answered=true;
  const q=deck[idx];
  const chosen=document.getElementById('opt'+i).dataset.key;
  [0,1].forEach(j=>{
    const b=document.getElementById('opt'+j);
    b.disabled=true;
    if(b.dataset.key===q.correct) b.classList.add('ok');
    else if(j===i) b.classList.add('ng');
  });
  document.getElementById('q-card').classList.add('answered');
  const fb=document.getElementById('feedback');
  if(chosen===q.correct){
    stats.c++;
    fb.textContent='正解！　'+q.correctZh;
    fb.className='feedback ok';
  } else {
    stats.w++;
    wrongLabels.add(q.label); saveWrong(); updateWrongUI();
    fb.textContent='不正解。正解：'+q.correctV+'ます　'+q.correctZh;
    fb.className='feedback ng';
    document.getElementById('opt'+i).classList.add('shake');
  }
  document.getElementById('q-zh').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('sc').textContent=stats.c;
  document.getElementById('sw').textContent=stats.w;
}

function nextQ(){
  idx++;
  if(idx>=deck.length) showResult();
  else render();
}

function showResult(){
  document.getElementById('main-area').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.classList.add('show');
  const total=deck.length;
  const pct=(stats.c/total*100).toFixed(1);
  document.getElementById('r-score').textContent=stats.c+' / '+total;
  document.getElementById('r-pct').textContent=pct+'%';
  let kanji='優', msg='';
  if(pct>=95){ kanji='秀'; msg='ほぼ完璧です！語彙の定着が進んでいます。'; }
  else if(pct>=80){ kanji='優'; msg='よくできました！錯題を中心にもう一度練習しましょう。'; }
  else if(pct>=60){ kanji='良'; msg='まあまあです。間違えた問題を重点的に復習してください。'; }
  else { kanji='可'; msg='基礎から見直してみましょう。焦らず一歩ずつ！'; }
  document.getElementById('r-kanji').textContent=kanji;
  document.getElementById('r-msg').textContent=msg;
}

function restartAll(){ setMode('all'); }
function restartWrong(){ setMode('wrong'); }

// Init
loadWrong();
deck=shuffle(ALL);
render();
</script>
</body>
</html>
